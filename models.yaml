# 定义所有可用的模型及其连接方式
local:
  - name: qwen2:latest
    type: ollama
    base_url: http://localhost:11434
    model: qwen2:latest

  - name: deepseek-r1:1.5b
    type: ollama
    base_url: http://localhost:11434
    model: deepseek-r1:1.5b

  - name: mistral:7b
    type: ollama
    base_url: http://localhost:11434
    model: mistral:7b
    
# 非法模型
  - name: zarigata/unfiltered-llama3:latest
    type: ollama
    base_url: http://localhost:11434
    model: mistral:7b

  - name: huihui_ai/gemma3-abliterated:latest
    type: ollama
    base_url: http://localhost:11434
    model: mistral:7b


commercial:
  # 商业模型默认启用；只有在对应环境变量存在时才会出现在交互菜单中
  - name: deepseek-chat
    type: openai_compatible
    provider: external
    base_url: https://api.deepseek.com
    model: deepseek-chat
    api_key_env: DEEPSEEK_API_KEY

  - name: deepseek-reasoner
    type: openai_compatible
    provider: external
    base_url: https://api.deepseek.com
    model: deepseek-reasoner
    api_key_env: DEEPSEEK_API_KEY

  - name: qwen-plus-2025-07-28
    type: openai_compatible
    provider: external
    base_url: https://dashscope.aliyuncs.com/compatible-mode/v1
    model: qwen-plus-2025-07-28
    api_key_env: QWEN_API_KEY
