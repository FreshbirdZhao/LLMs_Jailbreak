# 定义所有可用的模型及其连接方式，对齐强度由低到高
local:  
  - name: qwen2.5:1.5b
    type: ollama
    base_url: http://localhost:11434
    model: qwen2.5:1.5b

  - name: qwen2.5:3b
    type: ollama
    base_url: http://localhost:11434
    model: qwen2.5:3b

  - name: qwen3:8b
    type: ollama
    base_url: http://localhost:11434
    model: qwen3:8b

  - name: deepseek-r1:8b
    type: ollama
    base_url: http://localhost:11434
    model: deepseek-r1:8b

commercial:
  # 商业模型默认启用；只有在对应环境变量存在时才会出现在交互菜单中
  - name: deepseek-chat
    type: openai_compatible
    provider: external
    base_url: https://api.deepseek.com
    model: deepseek-chat
    api_key_env: DEEPSEEK_API_KEY

